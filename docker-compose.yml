services:
  drone-server:
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}
    ports:
      - "14550:14550/udp"
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ./config.example.yaml:/etc/drone-server/config.yaml:ro
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 256M
        reservations:
          cpus: "0.5"
          memory: 64M
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    profiles: ["monitoring"]
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - drone-server
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
