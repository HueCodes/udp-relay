version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gocritic
    - revive
    - misspell
    - prealloc
    - unconvert
    - unparam
    - bodyclose

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - unparam
    max-issues-per-linter: 50
    max-same-issues: 10
